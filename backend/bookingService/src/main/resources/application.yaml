server:
  port: 8083


spring:
  application:
    name: bookingService


  jackson:
    time-zone: Asia/Kolkata


  datasource:
    url: jdbc:mysql://localhost:3306/microstay_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect


  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true


eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true


feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000


management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always


logging:
  level:
    # Shows the exact mapping of the incoming URL to your Controller
    org.springframework.web: DEBUG


    # Shows if the @PathVariable or @RequestBody binding is failing
    org.springframework.web.servlet.mvc.method.annotation.ServletInvocableHandlerMethod: TRACE


    # Shows if the @Transactional proxy is failing to start a database connection
    org.springframework.transaction: DEBUG


    # Shows security filter decisions (in case it's crashing during auth)
    org.springframework.security: DEBUG
